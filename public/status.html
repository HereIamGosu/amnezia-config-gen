<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Статус сервисов — AmneziaWG Config Generator</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="static/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    />
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        background-color: #c0c0c0;
        font-family: "Press Start 2P", cursive, "MS Sans Serif", sans-serif;
        color: #000;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .window {
        width: min(680px, 98vw);
        border: 2px solid #000080;
        background-color: #c0c0c0;
        box-shadow: 5px 5px #808080;
        border-radius: 4px;
        overflow: hidden;
      }

      .window-header {
        background-color: #000080;
        color: #fff;
        padding: 6px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: bold;
        border-bottom: 2px solid #fff;
      }

      .window-title { flex: 1; line-height: 1.3; }

      .back-link {
        font-size: 9px;
        color: #fff;
        text-decoration: none;
        border: 1px solid rgba(255,255,255,0.5);
        padding: 3px 6px;
        border-radius: 2px;
        white-space: nowrap;
      }
      .back-link:hover { background: rgba(255,255,255,0.15); }

      .window-body { padding: 20px; }

      h1 {
        font-size: 12px;
        color: #000080;
        margin: 0 0 20px;
        text-align: center;
      }

      .status-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 24px;
      }

      .status-card {
        background: #fff;
        border: 2px solid #000080;
        border-radius: 4px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .status-indicator {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 2px solid rgba(0,0,0,0.25);
      }

      .status-indicator--ok      { background: #2ecc71; }
      .status-indicator--error   { background: #e74c3c; }
      .status-indicator--degraded{ background: #f39c12; }
      .status-indicator--unknown { background: #aaa; }

      .status-card__info { flex: 1; min-width: 0; }

      .status-card__name {
        font-size: 9px;
        font-weight: bold;
        color: #000080;
        margin-bottom: 4px;
      }

      .status-card__detail {
        font-size: 7px;
        color: #555;
        line-height: 1.5;
      }

      .status-card__badge {
        font-size: 8px;
        font-weight: bold;
        padding: 3px 8px;
        border-radius: 2px;
        border: 2px outset #fff;
        white-space: nowrap;
      }

      .badge--ok       { background: #2ecc71; color: #fff; }
      .badge--error    { background: #e74c3c; color: #fff; }
      .badge--degraded { background: #f39c12; color: #fff; }
      .badge--unknown  { background: #aaa;    color: #fff; }

      .last-checked {
        font-size: 8px;
        color: #555;
        text-align: center;
        border-top: 2px groove #c0c0c0;
        padding-top: 14px;
        line-height: 1.6;
      }

      .last-checked strong { color: #000080; }

      .loading-msg {
        font-size: 9px;
        color: #555;
        text-align: center;
        padding: 20px;
      }

      .error-msg {
        font-size: 9px;
        color: #c00;
        text-align: center;
        padding: 20px;
      }

      @media (max-width: 480px) {
        body { padding: 10px; }
        .status-card { flex-wrap: wrap; }
        .status-card__badge { margin-left: auto; }
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="window-header">
        <span class="window-title">📡 Статус сервисов</span>
        <a href="/" class="back-link">← Генератор</a>
      </div>
      <div class="window-body">
        <h1>Мониторинг зависимостей</h1>

        <div id="statusContent" class="loading-msg">Загрузка данных...</div>

        <div id="lastChecked" class="last-checked" hidden></div>
      </div>
    </div>

    <script>
      const SERVICE_LABELS = {
        warp_api:    { name: 'Cloudflare WARP API', url: 'api.cloudflareclient.com' },
        cidr_source: { name: 'Источник CIDR (iplist.opencck.org)', url: 'iplist.opencck.org' },
      };

      const STATUS_LABELS = { ok: 'ОК', error: 'ОШИБКА', degraded: 'НЕСТАБИЛЬНО', unknown: 'НЕИЗВЕСТНО' };

      const formatMoscowTime = (isoStr) => {
        const d = new Date(isoStr);
        if (isNaN(d)) return isoStr;
        return d.toLocaleString('ru-RU', {
          timeZone: 'Europe/Moscow',
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
        }) + ' (МСК)';
      };

      const renderStatus = (data) => {
        const content = document.getElementById('statusContent');
        const lastChecked = document.getElementById('lastChecked');

        if (!data || !data.services) {
          content.className = 'error-msg';
          content.textContent = 'Некорректный формат данных статуса.';
          return;
        }

        const isInitial = data.checked_at === '1970-01-01T00:00:00Z';
        if (isInitial) {
          content.className = 'error-msg';
          content.textContent = 'Данные мониторинга ещё не собраны. Healthcheck запускается раз в 30 минут через GitHub Actions.';
          return;
        }

        let html = '<div class="status-grid">';
        for (const [key, svc] of Object.entries(data.services)) {
          const label = SERVICE_LABELS[key] || { name: key, url: '' };
          const status = svc.status || 'unknown';
          const code = svc.http_code != null ? `HTTP ${svc.http_code}` : '—';
          html += `
            <div class="status-card">
              <div class="status-indicator status-indicator--${status}"></div>
              <div class="status-card__info">
                <div class="status-card__name">${label.name}</div>
                <div class="status-card__detail">${label.url} &nbsp;·&nbsp; ${code}</div>
              </div>
              <span class="status-card__badge badge--${status}">${STATUS_LABELS[status] || status}</span>
            </div>`;
        }
        html += '</div>';
        content.className = '';
        content.innerHTML = html;

        lastChecked.hidden = false;
        lastChecked.innerHTML = `<strong>Последняя проверка:</strong><br>${formatMoscowTime(data.checked_at)}`;
      };

      fetch('https://raw.githubusercontent.com/HereIamGosu/amnezia-config-gen/healthcheck-snapshots/public/status.json', { cache: 'no-store' })
        .then((r) => r.json())
        .then(renderStatus)
        .catch(() => {
          const c = document.getElementById('statusContent');
          c.className = 'error-msg';
          c.textContent = 'Не удалось загрузить данные статуса.';
        });
    </script>
  </body>
</html>
