name: Test Templates

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run template tests
        run: npm test
        env:
          # No real KV credentials — endpointCache must fall back gracefully
          KV_REST_API_URL: ''
          KV_REST_API_TOKEN: ''
